# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: 'en-US' # Set language for reviews (ISO code: en-US, ar for Arabic optional)
tone_instructions: 'professional' # Options: professional, casual, direct
early_access: true

# Review settings
reviews:
  # Assertive profile for comprehensive, detailed feedback on architecture and security
  profile: 'assertive'
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: '@coderabbitai summary'
  auto_title_placeholder: '@coderabbitai'
  poem: false
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: true
  estimate_code_review_effort: true
  abort_on_close: true

  # Path filters - exclude build artifacts, dependencies, and lock files
  path_filters:
    - '!vendor/**'
    - '!node_modules/**'
    - '!.next/**'
    - '!dist/**'
    - '!build/**'
    - '!coverage/**'
    - '!**/*.lock'
    - '!storage/logs/**'
    - '!**/.env*'

  # Path-specific review instructions aligned with Bunyan architecture
  path_instructions:
    # ==================== BACKEND (LARAVEL) ====================

    # API Routes - Check RBAC middleware, route grouping, versioning
    - path: 'backend/routes/**/*'
      instructions: |
        "Review API routes for:
        - Correct middleware chain: auth:sanctum → RBAC policies
        - Endpoint versioned under /api/v1/
        - Resource naming (plural nouns: /projects, /phases)
        - Nested resources follow ownership: /projects/{project}/phases
        - No business logic in route definitions
        - Proper HTTP methods (POST create, GET read, PUT update, DELETE destroy)
        - Form Request validation applied via middleware"

    # Controllers - Keep thin, delegate to services
    - path: 'backend/app/Http/Controllers/**/*'
      instructions: |
        "Review Controllers for:
        - Controllers are thin (5-10 lines max)
        - Business logic delegated to Services
        - Inject dependencies via constructor
        - Return API Resources (not raw models)
        - Request validation via Form Request classes
        - Proper exception handling (map to error codes)
        - No direct Eloquent queries (use Repository pattern)
        - RBAC authorization via Policies provided in routes"

    # Services - Business logic layer
    - path: 'backend/app/Services/**/*'
      instructions: |
        "Review Services for:
        - Pure business logic, no HTTP concerns
        - No direct Eloquent queries (use Repository)
        - Dependency injection via constructor
        - Public methods represent domain operations
        - Proper error handling with domain exceptions
        - Transaction management for multi-step operations
        - Workflow engine integration (if applicable)
        - Audit logging for mutations (created_by, updated_by)"

    # Repositories - Database access layer
    - path: 'backend/app/Repositories/**/*'
      instructions: |
        "Review Repositories for:
        - Eloquent queries ONLY (no raw SQL without //comment)
        - Eager loading to prevent N+1 queries
        - Query scopes used for reusable filters
        - select() used to limit columns
        - Index usage on WHERE, ORDER BY, JOIN columns
        - Soft deletes applied consistently
        - No business logic, just data access"

    # Eloquent Models
    - path: 'backend/app/Models/**/*'
      instructions: |
        "Review Models for:
        - Relationships defined correctly
        - Scopes for query filtering
        - Accessors/Mutators for computed properties
        - Fillable/Hidden properties explicit
        - No business logic (use Services)
        - Casts defined (dates, JSON, enums)
        - timestamps, soft_deletes applied per domain
        - utf8mb4 charset for Arabic text"

    # Form Requests - Validation layer
    - path: 'backend/app/Http/Requests/**/*'
      instructions: |
        "Review Form Requests for:
        - authorize() method checks role RBAC (via Policy)
        - rules() method defines all validations
        - Custom error messages in Arabic + English
        - Validated data properly typed
        - No business logic (validation only)"

    # API Resources - Response formatting
    - path: 'backend/app/Http/Resources/**/*'
      instructions: |
        "Review API Resources for:
        - Consistent response structure
        - Only expose necessary fields
        - Relationships loaded as sub-resources
        - Proper pagination format
        - Error format: {success, error: {code, message}}"

    # Database Migrations
    - path: 'backend/database/migrations/**/*'
      instructions: |
        "Review Migrations for:
        - Forward-only (never modify existing migrations)
        - Naming: YYYY_MM_DD_HHMMSS_verb_noun_table.php
        - down() rollback implemented
        - utf8mb4 charset for Arabic text
        - Foreign keys with cascade/restrict strategy
        - Indexes on foreign keys, frequently filtered columns
        - Soft deletes on: users, projects, phases, tasks, products, orders
        - Audit columns: created_at, updated_at, created_by, updated_by
        - Lock risk analysis (ALTER COLUMN HIGH risk on large tables)"

    # Laravel Config
    - path: 'backend/config/**/*'
      instructions: |
        "Review config for:
        - No hardcoded secrets (use .env)
        - Database charset utf8mb4
        - Queue/Redis configuration
        - Sanctum token expiration
        - CORS settings"

    # Policies - Authorization
    - path: 'backend/app/Policies/**/*'
      instructions: |
        "Review Policies for:
        - RBAC checks (is user allowed?)
        - before() method for admin bypass
        - viewAny() checks list permission
        - view() checks read permission
        - create() checks create permission
        - update() checks ownership/role
        - delete() checks role + ownership
        - No complex business logic (just auth checks)"

    # ==================== FRONTEND (NUXT.JS) ====================

    # Vue Components
    - path: 'frontend/components/**/*.vue'
      instructions: |
        "Review Vue components for:
        - Use Composition API (<script setup lang=\"ts\">)
        - No Options API
        - Strict TypeScript typing
        - No business logic (use composables)
        - Props validation with TypeScript interfaces
        - Emit events with proper typing
        - Use Nuxt UI (UButton, UCard, UForm, UTable, etc.)
        - Tailwind CSS v4 utilities only (no custom CSS)
        - RTL support via logical properties (margin-inline, padding-inline)
        - Accessibility (ARIA labels, roles)
        - Translation keys via $t() for all user-facing text"

    # Pages/Routes
    - path: 'frontend/pages/**/*.vue'
      instructions: |
        "Review Pages for:
        - Use definePageMeta() for layout, middleware
        - Proper middleware (auth, role-based) applied
        - Data fetched in setup or via composables
        - Error boundaries for API failures
        - Loading states
        - RTL layout verified
        - Arabic translations for all UI text"

    # Composables
    - path: 'frontend/composables/**/*.ts'
      instructions: |
        "Review Composables for:
        - Pure logic, no component rendering
        - Used for API calls (useApi composable wraps client)
        - Error handling standardized
        - Reactive refs/computed properly used
        - No hardcoded API URLs (use useApi)
        - Proper cleanup in onBeforeUnmount"

    # Pinia Stores
    - path: 'frontend/stores/**/*.ts'
      instructions: |
        "Review Pinia Stores for:
        - State: reactive data
        - Getters: computed state
        - Actions: async operations + API calls
        - No API calls in getters
        - Reset store on logout
        - Proper TypeScript interfaces
        - Use useApi for HTTP"

    # API Client Composable
    - path: 'frontend/composables/useApi.ts'
      instructions: |
        "Review useApi for:
        - All HTTP requests through this composable
        - Sanctum token injection in headers
        - Error handling standardized
        - Request/response interceptors
        - Tenant-aware if needed
        - Timeout configuration
        - Retry logic for idempotent requests"

    # Tests - Frontend
    - path: 'frontend/tests/**/*'
      instructions: |
        "Review frontend tests for:
        - Vitest unit tests for composables
        - Vue Test Utils for component tests
        - Playwright for E2E tests
        - Arrange-Act-Assert pattern
        - Mock API responses
        - Test user interactions
        - RTL layout verified in tests
        - Arabic text rendering tested"

    # ==================== BACKEND TESTS ====================

    # PHPUnit Tests
    - path: 'backend/tests/**/*'
      instructions: |
        "Review backend tests for:
        - Unit tests for Services (no DB)
        - Feature tests for API endpoints
        - RBAC authorization tested (403 forbidden)
        - Happy path + edge cases covered
        - Arrange-Act-Assert pattern
        - Use factories for test data
        - Database transactions rolled back
        - Mock external services
        - Error response format validated"

    # ==================== GENERAL ====================

    # TypeScript files
    - path: '**/*.ts'
      instructions: |
        "Review TypeScript for:
        - Strict mode enabled (tsconfig.json)
        - No 'any' types (use 'unknown' if needed)
        - Explicit return types on functions
        - Interfaces for object shapes
        - Type aliases for unions/tuples
        - Import order: react/vue → lib → @/ → relative
        - ESLint rules enforced
        - No console.log in production code"

    # Vue files
    - path: '**/*.vue'
      instructions: |
        "Review Vue for:
        - Composition API only
        - <script setup lang=\"ts\"> required
        - Tailwind CSS v4 utilities
        - No inline styles (use classes)
        - Responsive design (mobile-first)
        - RTL support (dir-aware layouts)
        - i18n translation keys ($t)"

    # PHP files
    - path: '**/*.php'
      instructions: |
        "Review PHP for:
        - PSR-12 coding standard
        - Strict types: declare(strict_types=1);
        - Type hints on all parameters + returns
        - No var_dump/dd in production
        - Laravel conventions followed
        - No direct DB queries outside Repository
        - Proper exception handling
        - Audit logging for mutations"

    # Markdown documentation
    - path: '**/*.md'
      instructions: |
        "Review Markdown for:
        - Clear, concise explanations
        - Code examples accurate
        - Links working
        - Heading hierarchy correct
        - Arabic/English consistency"

  # Auto review configuration
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - 'WIP'
      - 'DO NOT MERGE'
      - 'wontfix'
    drafts: true
    base_branches: [main, develop, '^release/.*$', '^spec/.*$']

  # Tools configuration
  tools:
    # Shell script validation
    shellcheck:
      enabled: true

    # Markdown linting
    markdownlint:
      enabled: true

    # GitHub checks
    github-checks:
      enabled: true
      timeout_ms: 90000

    # Language tool for grammar
    languagetool:
      enabled: true
      enabled_only: false
      level: 'default'

    # ESLint for JS/TS/Vue (frontend)
    eslint:
      enabled: true

    # Ruff for any Python files
    ruff:
      enabled: false

    # Docker linting
    hadolint:
      enabled: true

    # Secret detection (prevent .env commits)
    gitleaks:
      enabled: true

    # YAML linting
    yamllint:
      enabled: true

# Chat configuration
chat:
  auto_reply: true
  art: true
  allow_non_org_members: true

# Knowledge base
knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  code_guidelines:
    enabled: false

<svg xmlns="http://www.w3.org/2000/svg" width="120" height="36" viewBox="0 0 120 36" fill="none">
  <!-- Bunyan wordmark: بنيان -->
  <rect width="120" height="36" rx="6" fill="transparent"/>
  <!-- Icon: abstract building / construction mark -->
  <rect x="4" y="20" width="6" height="12" rx="1" fill="#171717"/>
  <rect x="12" y="14" width="6" height="18" rx="1" fill="#171717"/>
  <rect x="20" y="10" width="6" height="22" rx="1" fill="#171717"/>
  <rect x="28" y="16" width="6" height="16" rx="1" fill="#171717"/>
  <!-- Wordmark -->
  <text x="42" y="26" font-family="Geist, system-ui, sans-serif" font-size="16" font-weight="500" fill="#171717" letter-spacing="-0.5">بنيان</text>
</svg>

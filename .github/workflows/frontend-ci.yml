name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          # Use `npm ci` when a lockfile exists for reproducible installs,
          # otherwise fall back to `npm install` so CI doesn't fail on repos
          # that don't commit a lockfile.
          if [ -f package-lock.json ]; then
            npm ci --no-audit
          else
            npm install --no-audit --no-fund
          fi

      - name: Run ESLint
        env:
          NODE_OPTIONS: -r ./scripts/polyfill-groupby.cjs
        run: npm run lint

      - name: Check formatting with Prettier
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Prepare Nuxt (pretest)
        run: npm run pretest

      - name: Run unit and component tests
        run: npm run test

      - name: Build frontend
        env:
          NUXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build

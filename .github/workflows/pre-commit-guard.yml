name: Pre-Commit Guard

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/**'

concurrency:
  group: pre-commit-guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve comparison range
        id: range
        run: |
          echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Check patch integrity
        run: git diff --check "${{ steps.range.outputs.base }}" "${{ steps.range.outputs.head }}"

      - name: Enforce lockfile discipline
        run: |
          CHANGED_FILES="$(git diff --name-only "${{ steps.range.outputs.base }}" "${{ steps.range.outputs.head }}")"

          if echo "$CHANGED_FILES" | grep -q '^backend/composer\.json$' && ! echo "$CHANGED_FILES" | grep -q '^backend/composer\.lock$'; then
            echo "backend/composer.json changed without backend/composer.lock."
            exit 1
          fi

          if echo "$CHANGED_FILES" | grep -q '^frontend/package\.json$' && ! echo "$CHANGED_FILES" | grep -q '^frontend/package-lock\.json$'; then
            echo "frontend/package.json changed without frontend/package-lock.json."
            exit 1
          fi

          echo "Dependency manifests and lockfiles are in sync."

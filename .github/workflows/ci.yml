name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: bunyan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_mysql, redis, mbstring, xml, bcmath, gd
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Copy environment file
        run: |
          if [ -f .env.ci ]; then
            cp .env.ci .env
          else
            cp .env.example .env
          fi
        working-directory: backend

      - name: Generate application key
        run: php artisan key:generate
        working-directory: backend

      - name: Run migrations
        run: php artisan migrate --force
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bunyan_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Laravel Pint (Lint)
        run: vendor/bin/pint --test
        working-directory: backend

      - name: PHPStan (Static Analysis)
        run: vendor/bin/phpstan analyse --memory-limit=512M
        working-directory: backend

      - name: PHPUnit (Tests)
        run: php artisan test --parallel
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bunyan_test
          DB_USERNAME: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1

  frontend:
    name: Frontend (Nuxt.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Verify Node.js version
        run: |
          echo "Node:" $(node -v)
          echo "Npm:" $(npm -v)
          MAJOR=$(node -v | sed 's/v//' | cut -d. -f1)
          if [ "$MAJOR" -lt 24 ]; then
            echo "Node.js major version is $MAJOR; CI requires Node.js 24+."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: TypeScript Check
        run: npx nuxi typecheck
        working-directory: frontend

      - name: Vitest (Unit + Component Tests)
        run: npm run test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: bunyan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_mysql, redis, mbstring, xml, bcmath, gd

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Setup backend environment
        run: |
          if [ -f .env.ci ]; then
            cp .env.ci .env
          else
            cp .env.example .env
          fi
          php artisan key:generate
          php artisan migrate --force
          php artisan db:seed --class=E2ESeeder --force
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bunyan_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Start Laravel API server
        run: php artisan serve --port=8000 &
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bunyan_test
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
        working-directory: frontend

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

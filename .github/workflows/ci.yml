name: Integration CI

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend/app/**'
      - 'backend/bootstrap/**'
      - 'backend/config/**'
      - 'backend/database/**'
      - 'backend/public/**'
      - 'backend/resources/**'
      - 'backend/routes/**'
      - 'backend/composer.json'
      - 'backend/composer.lock'
      - 'backend/ci.env'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'backend/app/**'
      - 'backend/bootstrap/**'
      - 'backend/config/**'
      - 'backend/database/**'
      - 'backend/public/**'
      - 'backend/resources/**'
      - 'backend/routes/**'
      - 'backend/composer.json'
      - 'backend/composer.lock'
      - 'backend/ci.env'
      - 'frontend/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: integration-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Cross-stack E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: bunyan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, redis, mbstring, xml, bcmath, gd
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: backend
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare backend environment
        working-directory: backend
        run: |
          cp ci.env .env
          php artisan key:generate --force
          php artisan migrate --force
          php artisan db:seed --class=E2ESeeder --force

      - name: Start Laravel API server
        working-directory: backend
        run: nohup php artisan serve --host=127.0.0.1 --port=8000 >/tmp/bunyan-laravel.log 2>&1 &

      - name: Wait for Laravel API
        run: |
          for attempt in {1..30}; do
            if curl --silent --fail http://127.0.0.1:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Laravel API did not become ready."
          cat /tmp/bunyan-laravel.log
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit

      - name: Install Playwright browsers
        working-directory: frontend
        env:
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          CI: true
          NUXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
          PW_SERVER_HOST: 127.0.0.1
          PW_SERVER_URL: http://127.0.0.1:3001
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
            /tmp/bunyan-laravel.log
          retention-days: 7
